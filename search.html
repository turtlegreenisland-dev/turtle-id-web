<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>查詢回報紀錄 — 海龜辨識系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <h1><a href="index.html">海龜辨識系統</a></h1>
      <nav class="site-nav">
        <a href="index.html">回報</a>
        <a href="search.html" class="active">查詢</a>
        <a href="admin.html">管理</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="card">
      <h2>查詢回報紀錄</h2>
      <p class="intro">輸入回報時填寫的姓名查詢比對結果。</p>

      <form id="searchForm" style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;">
        <div class="form-group" style="flex:1; min-width:200px; margin-bottom:0;">
          <label for="searchName">姓名</label>
          <input type="text" id="searchName" maxlength="20" required>
        </div>
        <button type="submit" id="searchBtn" class="btn btn-primary">搜尋</button>
      </form>

      <div id="alertBox" style="margin-top:18px;"></div>
      <div id="resultsArea" style="margin-top:18px;"></div>
    </div>
  </main>

  <div class="modal" id="imageModal">
    <button class="modal-close" id="modalClose">×</button>
    <img id="modalImage" src="" alt="">
  </div>

  <footer class="site-footer">
    海龜辨識系統 · 個體再辨識（Re-ID）
  </footer>

  <script src="js/config.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
